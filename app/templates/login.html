<!DOCTYPE html>
<html>


<head>
    <title>로그인</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f4;
        }
        .container {
            display: flex;
            flex-direction: column;
            width: 300px;
            padding: 20px;
            border: 1px solid rgba(17, 17, 17, 0.71);
            border-radius: 8px;
            background-color: white;
        }
        input {
            margin: 5px 0px;
            height: 40px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            height: 40px;
            margin-top: 10px;
            background-color: black; 
            color: white;          
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #333; 
        }
    </style>
</head>
<body>
   <div class="container">
    <h2 style="text-align: center; margin-bottom: 15px;">로그인</h2>
    
    <form action="/login_test" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <input type="text" name="user_id" placeholder="Nickname"> 
    <input type="password" name="user_pw" placeholder="Password">
    
    <button type="submit">로그인</button>
    </form>

    <div style="text-align: center; margin-top: 15px;">
    <p style="font-size: 12px; color: #666; margin-bottom: 5px;">아이디가 없으신가요?</p>
    <a href="/" style="text-decoration: none; color: #007bff; font-size: 14px; font-weight: bold;">회원가입 하러 가기</a>
</div>
</div>
</body>
</html>
