<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 오답노트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container" style="max-width: 800px; margin-top: 50px;">
    <h2>{{ user }}님의 오답노트 목록</h2>

    {% if notes %}
    <ul class="list-group">
        {% for note in notes %}
        <li class="list-group-item">
            <strong>[{{ note[3] }}]</strong> {{ note[2] }} — {{ note[4] }}
            <small class="text-muted">({{ note[5] }})</small>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>아직 작성한 노트가 없습니다.</p>
    {% endif %}

    <a href="{{ url_for('notes.note_page') }}" class="btn btn-primary mt-3">노트 하나 더 쓰기</a>
</div>
</body>
</html>
