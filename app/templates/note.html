<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오답 노트 기록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-label { font-weight: bold; }
        .header-title { text-align: center; margin-bottom: 30px; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="header-title">오답 노트 작성</h2>
    
    <form action="/save_note" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <div class="mb-3">
        <label for="problemName" class="form-label">문제 이름</label>
        <input type="text" class="form-control" name="title" id="problemName" placeholder="예: SQL Injection Advanced" required>
    </div>

    <div class="mb-3">
        <label class="form-label">카테고리</label>
        <select class="form-select" name="category" id="category" required>
            <option value="" selected disabled>카테고리를 선택하세요</option>
            <option value="web">Web</option>
            <option value="pwn">Pwnable</option>
            <option value="crypto">Crypto</option>
            <option value="rev">Reversing</option>
            <option value="misc">Misc</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="learned" class="form-label">배운 점 및 메모</label>
        <textarea class="form-control" name="content" id="learned" rows="5" placeholder="풀이 과정이나 배운 점을 적어주세요."></textarea>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary btn-lg">노트 저장하기</button>
    </div>
</form>
</div>

</body>
</html>
